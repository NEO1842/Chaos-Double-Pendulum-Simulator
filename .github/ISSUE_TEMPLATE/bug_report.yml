name: Bug Report
description: Report a problem in the simulation
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: 🚨 What happened?
      description: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 🎯 Expected behavior
      description: What should happen instead?

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Steps to reproduce
      description: How to reproduce the bug

  - type: textarea
    id: logs
    attributes:
      label: 📸 Logs / Screenshots
      description: Paste logs or screenshots

  - type: input
    id: env
    attributes:
      label: 🖥 Environment
      description: OS / Python / Blender version etc
